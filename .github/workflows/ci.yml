name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Tests (pytest)
        # The pytest suite is deliberately Stockfish-free and network-free — pure logic only
        # (rating math, position summary, lesson patterns, JSON salvage). No engine binary
        # or API key is available in CI, so nothing here should need either.
        run: pytest

  javascript:
    name: JavaScript (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check
